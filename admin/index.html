<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — BANSEK Pure Water</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">💧</div>
        <h1>BANSEK</h1>
        <p>Admin Dashboard — Staff Access Only</p>
      </div>

      <div class="login-error" id="login-error">⚠️ Incorrect username or password.</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Sign In to Dashboard</button>
      </form>

      <p class="login-footer">🔒 Secure access · BANSEK Pure Water Management</p>
    </div>
  </div>

  <script>
    // ── Default credentials (change these!) ──────────
    // To change: update ADMIN_USER and ADMIN_PASS below
    const ADMIN_USER = 'bansek_admin';
    const ADMIN_PASS = 'bansek2026';

    // Resolve paths relative to current location so it works
    // both locally (admin/index.html) and on the server (/admin/)
    const BASE = window.location.pathname.replace(/\/[^/]*$/, '/');

    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem('bansek_auth') === 'true') {
      window.location.href = BASE + 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const err  = document.getElementById('login-error');

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('bansek_auth', 'true');
        window.location.href = BASE + 'dashboard.html';
      } else {
        err.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
